來至於今日或因五住地煩惱造一切罪或因五受根造一切罪或因五蓋造一切罪或因五慳造一切罪或因五見造一切罪或因五心造一切罪如是等煩惱無量無邊惱亂六道一切眾生今日發露皆悉懺悔又復弟子等無始已來至於今日或因六情造一切罪或因六識造一切罪或因六想造一切罪或因六受造一切罪或因六行造一切罪或因六愛造一切罪或因六塵造一切罪如是等煩惱無量無邊惱亂六道一切四生今日慚愧發露皆悉懺悔又復弟子等無始已來至於今日或因七漏造一切罪或因七使造一切罪或因八倒造一切罪或因八垢造一切罪或因八苦造一切罪惱亂六道一切四生今日發露皆悉懺悔又復弟子等無始已來至於今日或因九惱造一切罪或因九結造一切罪或因九上緣造一切罪或因十煩惱造一切罪或因十緣造一切罪或因十一遍使造一切罪或因十二入造一切罪或因十六知見造一切罪或因十八界造一切罪或因二十五有造一切罪或因六十二見造一切罪或因見諦思惟九十八使百八煩惱晝夜熾燃開諸漏門造一切罪惱亂賢聖及以四生遍滿三界彌亘六道無處可藏無處可避今日誠心向十方諸佛尊法聖眾慚愧發露皆悉懺悔願弟子等承是懺悔三毒一切煩惱所生功德生生世世三慧明三達朗三苦滅三願滿願弟子承是懺悔四識等一切煩惱所生功德生生世世廣四等心立四信業四惡趣滅得四無畏願弟子等承是懺悔五蓋等諸煩惱所生功德度五道樹五根淨五眼成五分願令弟子承是懺悔六愛等諸煩惱所生功德願生生世世具足六神通滿足六度業不為六塵惑常行六妙行又願弟子等承是懺悔七漏八垢九結十纏等一切煩惱所生功德生生世世坐七淨華洗塵八水具九斷智成十地行願以懺悔十一遍使及十二入十八界等一切煩惱所生功德願十一空解常用栖心自在能轉十二行輪具足十八不共之法無量功德一切願滿大乘蓮華寶達問答報應沙門品第廿八爾時摩竭道場菩提樹華光明不現其華枯悴墮落佛前一切大眾皆悉驚疑各相謂言今此菩提道場樹華何故墮落大眾菩薩皆生疑惑不自安隱爾時寶達菩薩前白佛言云何菩提樹華皆悉墮落其華光色不如於常一切大眾皆生疑惑唯願天尊為我解說令此眾中諸座大士疑惑悉除爾時世尊從三昧起光顏巍巍舉身毛孔皆悉出光語寶達菩薩言汝當善聽今為汝說所以菩提樹華墮落失光者何如上所說沙門行惡墮落苦處受罪無殃是故菩提樹華失光墮落寶達前白佛言唯願為我說此惡行沙門果報之處佛告寶達菩薩東方乃有鐵圍大山其山中間幽冥之處日月光明及以火光所不能照名曰地獄其獄之中有惡沙門受如是罪汝可往詣問諸罪人云何因緣來生此處修何等行受如是罪寶達白佛言世尊我無威德見東方阿鼻地獄佛言善哉善哉汝今但往令汝得見寶達菩薩禮佛而去龍飛虛空徘徊自在當爾之時大地震動於虛空中雨寶蓮華飛流而下爾時寶達一念之頃往詣東方鐵圍山間其山崦𭗮幽冥高峻其山四方了無草木日月威光都不能照寶達復前夾道兩邊有卅六王典主地獄其王名曰𠷐伽噤王波吉頭王廣目都王安頭羅王虎目見王陽聲吉王大諍誦王吸血鬼王安得羅王陀達王達多羅王吉梨善王安唯羅王寶首王金樹吉王大惡聲王鳥頭王等虎眼王等象牙王等震聲王等歸首王衣首王見首王廣安王廣定王王頭王立正王立見王摩尼羅王都曹王部見王西目王善目王龍口王鬼王南安王等卅六王遙見寶達菩薩皆悉叉手合掌前行作禮白言大智尊王云何因緣入此苦處亦如旃檀在伊蘭而生寶達答言我聞如來三界人尊說言東方有鐵圍山其山幽冥日月之光所不能照我故聞之故來詣汝諸王前入地獄行諸罪人汝等諸王誰能共我往詣大王前見諸罪人受苦之者爾時𠷐伽噤王則便與寶達菩薩往詣大王爾時大鬼王遙見寶達菩薩從門而來光顏從容即便下座往前禮拜白言大王今此惡處云何怪哉伊蘭林中忽生旃檀爾時寶達便前就坐問鬼王曰今此東方地獄可有幾獄鬼王答言此山之中有無量地獄今此一方有卅二沙門地獄寶達問曰卅二地獄其名云何鬼王答曰鐵車鐵馬鐵牛鐵驢地獄鐵衣地獄鐵珠地獄烊銅灌口地獄流火地獄鐵床地獄耕田地獄斫首地獄燒脚地獄鐵鏘地獄飲鐵珠地獄飛刀地獄火箭地獄𦞙肉地獄身燃地獄火丸仰口地獄諍論地獄雨火地獄流火地獄糞屎地獄鈎地獄火象地獄咩聲咬叫地獄鐵蒺藜地獄崩埋地獄燃手脚地獄銅狗鐵牙地獄剝皮飲血地獄解身地獄鐵屋地獄鐵山地獄飛火咬叫爪頸地獄爾時鬼王答寶達曰地獄受罪其名如是錄文完方廣錩修改審定錄文

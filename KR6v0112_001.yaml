body:
  text: 如是我聞一時佛在舍婆提城祇樹給孤獨園與大比丘眾千二百五十人俱爾時世尊四眾圍遶及天龍夜叉乾闥婆阿修羅迦樓羅緊那羅摩睺羅伽人非人等爾時世尊告諸大眾汝當諦聽我為汝說過去未來現在諸佛名字若善男子善女人受持讀誦諸佛名者是人現世安隱遠離諸難及消滅諸罪未來當得阿耨多羅三藐三菩提若善男子善女人欲消滅諸罪當淨洗浴著新淨衣長跪合掌而作是言南無東方阿閦佛南無火光佛南無靈目佛南無無畏佛南無不可思議佛南無燈王佛南無放光佛南無光明莊嚴佛南無大勝佛南無成就大事佛南無實見佛南無堅王花佛歸命東方如是等無量無邊諸佛南無南方普滿佛南無威王佛南無住持疾行佛南無黠慧佛南無稱聲佛南無不厭見身佛南無師子聲佛南無不空見佛南無起行佛南無一切行清淨佛南無莊嚴王佛南無大山王佛歸命南方如是等無量無邊諸佛南無西方無量壽佛南無師子佛南無香積王佛南無香手佛南無奮迅佛南無虛空藏佛南無寶幢佛南無清淨眼佛南無樂莊嚴佛南無寶山佛南無光王佛南無善寂智慧月聲自在王佛歸命西方如是等無量無邊諸佛南無北方難勝佛南無月光佛南無金色王佛南無月色旃檀佛南無普眼見佛南無普照眼見佛南無輪手佛南無無垢佛歸命北方如是等無量無邊諸佛南無東南方持地佛南無自在佛南無法自在佛南無法慧佛南無法思佛南無常法慧佛南無常樂佛南無善思惟佛南無善住佛南無善臂佛歸命東南方如是等無量無邊諸佛南無西南方那羅延佛南無龍王德佛南無寶聲佛南無地自在佛南無人王佛南無妙聲佛南無黠慧佛南無妙香聲佛南無天王佛南無常清淨眼佛歸命西南方如是等無量無邊諸佛南無西北方月光面佛南無月光佛南無月幢佛南無勇猛佛南無旃檀佛南無自在佛南無日光面佛南無日藏佛南無日光莊嚴佛南無華身佛南無波頭摩藏佛南無波頭摩鬚佛南無師子聲王佛南無阿彌陀仙佛歸命西北方如是等無量無邊諸佛南無東北方寂諸根佛南無寂滅佛南無大將佛南無淨勝佛南無淨妙聲佛南無淨天供養佛南無善化佛南無化佛南無善意佛南無善意住持佛歸命東北方如是等無量無邊諸佛南無下方實行佛南無疾行佛南無黠慧佛南無堅固王佛南無金剛齊佛南無師子佛南無奮迅佛南無如實住佛南無功德佛南無功德得佛南無善安樂佛南無釋迦牟尼佛歸命下方如是等無量無邊諸佛南無上方無量勝佛南無雲王佛南無雲功德佛南無無量稱名佛南無聞身王佛南無大功德佛南無大須彌佛南無降伏魔王佛歸命上方如是等無量無邊諸佛南無未來普賢佛南無彌勒佛南無觀世自在佛南無得大勢至佛南無虛空藏佛南無無垢稱佛南無成就義佛南無實聲佛南無大海佛南無無盡意佛歸命未來如是等無量無邊諸佛善男子善女人受持讀誦是諸佛名現世安隱遠離諸難及消滅諸罪未來畢竟得阿耨多羅三藐三菩提南無無垢光佛南無樂莊嚴思惟佛南無無垢月幢稱佛南無華佛南無火光佛南無寶上佛南無無畏觀佛南無遠離諸畏驚怖佛南無師子奮迅力佛南無金光明王佛若善男子善女人十日讀誦思惟是佛名必得遠離一切業障南無一切同名佛南無日龍奮迅二佛南無一切同名日龍奮迅佛南無六十功德寶佛南無一切同名功德寶佛南無十二毘留羅佛南無一切同名毘留羅佛南無八萬四千名自在幢佛南無一切同名自在幢佛南無三百大幢佛南無一切同名大幢佛南無五百淨聲王佛南無一切同名淨聲王佛南無五百波頭摩王佛南無一切同名波頭摩王佛南無五百日聲佛南無一切同名日聲佛南無五百樂自在聲佛南無一切同名樂自在聲佛南無五百日佛南無一切同名日佛南無五百普光佛南無一切同名普光佛南無五百波頭摩上王佛南無一切同名波頭摩上王佛南無七百法光莊嚴佛南無一切同名法光莊嚴佛南無千法莊嚴王佛南無一切同名法莊嚴王佛南無千八百稱聲王佛南無一切同名稱聲王佛南無三萬散華佛南無一切同名散華佛南無三萬三百稱聲王佛南無一切同名稱聲王佛南無八萬四千阿難陀佛南無一切同名阿難陀佛南無千八百寂滅佛南無一切同名寂滅佛南無五百歡喜佛南無一切同名歡喜佛南無五百威德佛南無一切同名威德佛南無五百上威德佛南無一切同名上威德佛南無五百日王佛南無一切同名日王佛南無千雲雷聲王佛南無一切同名雲雷聲王佛南無千日熾自在聲佛南無一切同名日熾自在聲佛南無千離垢聲自在王佛南無一切同名離垢聲自在王佛南無千勢自在聲佛南無一切同名勢自在聲佛南無千功德蓋幢安隱自在王佛南無一切同名功德蓋安隱自在王佛南無千閻浮檀佛南無一切同名閻浮檀佛南無千無垢聲自在王佛南無一切同名無垢聲自在王佛南無千遠離諸怖聲自在王佛南無一切同名遠離諸怖聲自在王佛南無二千拘隣佛南無一切同名拘隣佛南無二千寶幢佛南無一切同名寶幢佛南無八千堅精進佛南無一切同名堅精進佛南無八千威德佛南無一切同名威德佛南無八千燃燈佛南無一切同名燃燈佛南無十千迦葉佛南無一切同名迦葉佛南無十千清淨面蓮華香積佛南無一切同名清淨面蓮華香積佛南無十千莊嚴王佛南無一切同名莊嚴王佛南無十千星宿佛南無一切同名星宿佛南無一萬八千莎羅王佛南無一切同名莎羅王佛南無一萬八千莎羅自在王佛南無一切同名莎羅自在王佛南無一萬八千普護佛南無一切同名普護佛南無四萬願莊嚴佛南無一切同名願莊嚴佛南無三千毘盧舍那佛南無一切同名
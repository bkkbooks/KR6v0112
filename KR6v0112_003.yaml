body:
  text: 南無月燃燈佛南無日燃燈佛南無日月燃燈佛南無雲聲燃燈佛南無大海燃燈佛南無忍辱輪燃燈佛南無世燃燈佛南無光明遍照十方燃燈佛南無照諸趣燃燈佛南無破諸闇燃燈佛南無一切世成就燃燈佛南無諦寶幢摩尼勝光佛南無淨華宿王智佛南無俱蘇摩見佛南無不散佛南無散華佛南無不散華佛南無放光明佛南無千光明佛南無六十光明佛南無觀光明佛南無無障礙光明佛南無放淨光明佛南無無邊光明佛南無波頭摩光明佛南無福德光明佛南無智光明佛南無月光明佛南無日光明佛南無無礙光明佛南無奮迅恭敬稱佛南無無比佛南無功德稱佛南無寶稱佛南無無垢稱佛南無無垢德佛南無堅德佛南無無憂德佛南無勇猛德佛南無華德佛南無歡喜德佛南無龍德佛南無功德海佛南無淨德佛南無淨天佛南無供養佛南無淨聲佛南無淨妙聲佛南無出淨聲佛南無普智輪光聲佛南無大聲佛南無雲勝聲佛南無安隱聲佛南無樂聲佛南無妙鼓聲佛南無天聲佛南無月聲佛南無日聲佛南無波頭摩聲佛南無師子聲佛南無福德聲佛南無金剛聲佛南無自在聲佛南無慧聲佛南無妙聲佛南無選擇聲佛南無甘露聲佛南無淨幢佛南無金剛幢佛南無法幢佛南無住持法佛南無樂法佛南無護法佛南無曇無竭佛南無法奮迅佛南無法界華佛南無護法眼佛南無燃法庭燎佛南無法自在佛南無人自在佛南無功德自在佛南無聲自在佛南無世自在佛南無觀世自在佛南無無量自在佛南無意住持佛南無地住持佛南無尼彌住持佛南無器住持佛南無功德性住持佛南無勝色佛南無轉發起佛南無一切觀形示佛南無發一切無厭足行佛南無發成就佛南無善護佛南無善思惟佛南無善喜佛南無善處佛南無普禪佛南無甘露功德佛南無善眼佛南無師子仙佛南無佛眼佛南無合聚佛南無疾智勇佛南無善住佛南無實行佛南無師子手佛南無海佛南無善思惟佛南無稱佛南無住慈佛南無善夜摩佛南無善行佛南無善功德佛南無善色佛南無善識佛南無善心佛南無善光佛南無師子月佛南無不可勝佛南無不可勝無畏佛南無無量佛南無速興佛南無不動心佛南無應稱佛南無應不怯弱聲佛南無不厭足藏佛南無不盡佛南無不可動佛南無名無畏佛南無名自在護世間佛南無名龍自在聲佛南無名法行廣慧佛南無名妙勝自在相通稱佛南無名妙勝自在勝佛南無名樂法奮迅佛南無名法界莊嚴佛南無名大乘莊嚴佛南無名寂靜王佛南無名解脫行佛南無名大海彌留起王佛南無名合聚那羅延王佛南無名散壞堅魔輪佛南無名精進根寶王佛南無名佛法波頭摩佛南無名得佛眼分陀利佛南無名隨前覺覺佛南無名平等作佛南無名初發心念遠離一切驚怖無煩惱起功德佛南無名金剛奮迅佛南無名寶像光明奮迅佛南無名破壞魔輪佛南無名初發心成就不退勝輪佛南無名寶蓋起無畏光明佛南無名教化菩薩佛南無名初發心念斷疑斷煩惱佛南無名光明破闇起三昧王佛是諸佛如來名十方世界眾生無眼者誦必得眼南無十千同名星宿佛南無一切星宿如來南無三十千同名釋迦牟尼佛南無一切釋迦牟尼如來南無二億同名拘隣佛南無一切拘隣如來南無十八億同名實法勝決定佛南無一切實法勝決定如來南無十八億同名日月燈佛南無一切日月燈如來南無千五百同名大威德佛南無一切大威德如來南無千五百同名日佛南無一切日如來南無四萬四千同名面佛南無一切面如來南無萬千同名堅固自在佛南無一切堅固自在如來南無萬八千同名普護佛南無一切普護如來南無千八百同名舍摩他佛南無舍摩他如來劫名善眼彼劫中有七十二那由他如來成佛我悉歸命彼諸如來劫名善見彼劫中有七十二億如來成佛我悉歸命彼諸如來劫名淨讚歎彼劫中有一萬八千如來成佛我悉歸命彼諸如來劫名善行彼劫中有三萬二千如來成佛我悉歸命彼諸如來劫名莊嚴彼劫中有八萬四千如來成佛我悉歸命彼諸如來南無現在住十方世界不捨命說法諸佛所謂安樂世界中阿彌陀如來為上首樂世界中阿閦如來為上首袈裟幢世界中碎金剛堅如來為上首不退輪吼世界中清淨光波頭摩華身如來為上首無垢世界中法幢如來為上首善燈世界中師子如來為上首善住世界中盧舍那藏為上首難過世界中功德華身如來為上首莊嚴慧世界中一切通光明如來為上首鏡輪光明世界中月智如來為上首華勝世界中波頭摩勝如來為上首波頭華勝世界中賢勝如來為上首不瞬世界中普賢如來為上首普賢世界中自在王如來為上首不可勝世界中成就一切義如來為上首娑婆世界中釋迦牟尼如來為上首善勝勝如來為上首自在幢王如來為上首作火光如來為上首無畏觀如來為上首如是等上首諸佛我以身業口業意業遍滿十方一時禮拜讚歎供養所謂彼佛所說法甚深境界不可量境界不可思議境界無量境界等我悉以身業口業意業遍滿十方禮拜讚歎供養所謂彼佛世界中不退菩薩僧不退聲聞僧我悉以身業口業意業遍滿十方頭面禮足讚歎供養南無名降伏魔人自在佛南無名降伏貪自在佛南無名降伏瞋自在佛南無名降伏癡自在佛南無名降伏怒自在佛南無名降伏見自在佛南無名降伏諸戲自在佛南無名了達法自在佛南無名得神通自在稱佛南無名得勝業自在稱佛南無名起施自在稱佛南無名起清淨戒自在稱佛南無名起忍辱人自在稱佛南無名起精進自在稱佛南無名起禪人自在稱佛南無名福德清淨光明自在佛南無名起陀羅尼自在稱佛南無高勝如來南無光明勝如來南無大勝如來南無散香上勝如
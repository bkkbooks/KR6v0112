front:
  text: 佛説佛名經二十卷本整理者張麗張磊題解佛説佛名經中國人編撰佛教經典二十卷作者不詳本文獻未為我國歷代經録所著録也未為歷代大藏經所收根據目前掌握的材料它僅保存在敦煌遺書中卷十六亡佚共存十九卷本文獻在隋代流行的三寶崇拜思想的影響下産生故每卷依照三寶次第依次禮拜佛法僧三寶然後為懺悔文最後分段摘抄大乘蓮華寶達菩薩問答報應沙門經反映了三寶崇拜與禮懺思想相結合的信仰形態從形成淵源看本文獻的前十八卷佛名部分主要承襲元魏菩提留支譯十二卷本佛名經而來故可以依據十二卷本佛名經補足本文獻相關的缺失經文甚至可以依據十二卷本佛名經區分本文獻諸卷之起訖後兩卷佛名部分則大抵承襲大通方廣懺悔滅罪莊嚴成佛經及其他材料而成該文獻産生後又對十六卷本佛名經的形成給與一定的影響如不加特別説明校記中大正藏本均指大正藏本十二卷佛名經為便於與其他卷本的佛名經核對藏外佛教文獻整理時為二十卷本佛名經逐一加上行號本文獻篇幅較大藏外佛教文獻將分輯逐步發表全部整理本有關整理説明及工作情況將在該經全文發表之後一併公布今將本文獻底校本情況介紹如下佛説佛名經卷第一底本斯號校本甲本北敦號佛説佛名經卷第二底本北敦號校本甲本北敦號乙本北敦號佛説佛名經卷第三底本北敦號校本甲本北敦號北敦號佛説佛名經卷第四底本斯號校本甲本北敦號乙本斯號丙本斯號丁本北敦號戊本斯號録文

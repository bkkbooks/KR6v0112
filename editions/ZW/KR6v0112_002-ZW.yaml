中鐵城高一由旬猛火輝赫烟燃其車鐵作炎赫熾燃中有鐵牛其身亦燃頭角毛尾皆如鋒釯毛中火燃烟炎俱出其鐵馬者身毛駿尾利如刀鋒毛尾火燃烟炎俱出其鐵驢者亦復如是其地獄中有鐵蒺藜利如鋒釯鐵鏘繚亂遍布其地其鏘火燃猛熾於前爾時北門之中有五百沙門咩聲哮叫眼口中火出唱如是言云何我今受如此苦獄卒夜叉馬頭羅剎手捉三鈷鐵叉望背而鐘胸前而出復有鐵索來繼其臂其索火燃燒罪人臂復有鐵枷枷罪人咽其枷八方利如鋒釯烟火猛熾燒罪人頸爾時罪人宛轉倒地而不肯前馬頭羅剎手捉鐵棒望頭而打罪人身體碎如微塵復有餓鬼來食其肉復有餓狗來飲其血馬頭羅剎踏地言活罪人即活爾時鐵牛吼喚刨地其牛吼喚來向罪人罪人迫迮宛轉於地馬頭羅剎手捉鐵叉叉着車上罪人跳踉復墮牛上牛毛仰刺從腹而入背上而出牛復跳踉復墮馬上馬毛仰刺亦如鋒釯馬尾𣭱之身即碎爛須臾還活爾時鐵馬舉脚連蹴身碎如塵須臾還活復騎鐵驢驢即跳踉罪人墮地驢便大瞋舉脚連蹴須臾還活一日一夜受罪無量寶達問馬頭羅剎曰此諸沙門云何如是羅剎答曰此諸沙門受佛禁戒不慎將來但取現在違犯淨戒故作惡業畜不淨財乘車騎馬走驢治生心無慈善不護威儀受人信施惡因緣故墮此地獄百千萬劫若得為人身不具足聾盲閉塞不見三寶不聞正法寶達聞之悲泣歎曰云何沙門應出三界云何惡業受如是罪寶達捫淚悲泣而去錄文完方廣錩修改審定錄文

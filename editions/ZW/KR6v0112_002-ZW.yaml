body:
  text: 南無虛空寂佛南無虛空功德佛南無虛空庫藏佛南無虛空心佛南無虛空多羅佛南無無垢心佛南無放光世界中現在說法虛空勝離塵無垢塵平等眼清淨功德幢光明華波頭摩瑠璃光寶香象身勝妙羅網莊嚴頂無量日月光明照莊嚴願上莊嚴法界善化無障王佛彼佛世界中有菩薩名無比彼佛授記不久得阿耨多羅三藐三菩提號種種光華寶波頭摩金色身普照莊嚴不住眼放光照十方世界幢王佛若有善男子善女人信心受持讀誦彼佛及菩薩名是善男子善女人超越閻浮提微塵數劫得陀羅尼一切諸惡病不及其身南無無量功德寶集樂示現金光明師子奮迅王佛南無師子奮迅心雲聲王佛南無無垢清淨光明覺寶華不斷莊嚴王佛南無寶光月莊嚴智功德聲自在王佛南無寶波頭摩智清淨上王佛南無善住山王佛南無光華種種奮迅王佛南無拘蘇摩奮迅王佛南無波頭摩華上彌留幢王佛南無法幢空俱蘇摩王佛南無莎羅華上光王佛南無無垢上光王佛南無無垢意山上王佛南無種種樂說莊嚴佛南無無量藥王成就勝王佛南無千雲雲雷聲王佛南無金光明師子奮迅王佛南無善寂智慧月聲自在王佛南無善住摩尼山王佛從此已上六百佛南無歡藏勝山王佛南無普光上勝功德王佛南無功德藏增上山王佛南無動山嶽王佛南無善住諸禪藏王佛南無法海潮功德王佛南無稱功德山王佛南無一切華香自在王佛南無銀幢蓋王佛南無雷燈幢王佛南無月摩尼光王佛南無波頭摩上星宿王佛南無無量香上王佛南無覺王佛南無上彌留幢王佛南無莎羅華上王佛南無因陀羅幢王佛南無師子奮迅王佛南無俱蘇摩生王佛南無微細華佛南無說義佛南無無量精進佛南無無邊彌留佛南無離藏佛南無無量眼佛南無量發行佛南無無量發行佛南無斷諸難佛南無不定願佛南無善住諸願佛南無無念示現諸佛佛南無無量善根成就諸行佛南無無垢奮迅佛南無不住奮迅佛南無妙色佛南無無相聲佛南無虛空星宿增上王佛南無栴檀室佛南無樂意佛南無善行佛南無境界自在佛南無樂行佛南無樂解脫佛南無遠離怖畏毛竪佛南無清淨眼佛南無進寂靜佛南無世間可樂佛南無隨世間意佛南無隨世間眼佛南無寶佛南無種種樂說莊嚴佛南無無量藥王成就勝王佛南無發行難佛南無無所發行佛南無寶愛佛南無羅睺羅佛南無羅睺羅天佛南無羅睺淨佛南無寶慧佛南無寶髻佛南無寶形佛南無羅網手佛南無摩尼輪佛南無解脫威德佛南無善行佛南無大愛佛南無人面佛南無告佛南無曼陀羅佛南無淨聖佛南無淨宿佛南無離胎佛南無虛空莊嚴佛南無集功德佛南無師子步佛南無功德海佛南無摩尼功德佛南無廣功德佛南無稱成就佛南無大如意輪佛南無無畏上王佛南無俱蘇摩國土佛南無功德懷佛南無威德佛南無華眼佛南無喜身佛南無慧國土佛南無喜威德佛南無波頭池智慧奮迅佛南無功德聚佛南無寂滅慧佛南無降魔佛南無無上光佛南無法自在佛南無得世間功德佛南無實諦稱佛南無智勝佛南無智愛佛南無得智佛南無智幢佛從此以上七百佛十二部經一切賢聖南無羅網光幢佛善男子善女人與一切眾生安穩樂如諸佛者當讀誦是諸佛名復作是言南無離諸無智曀佛南無虛空平等心佛南無清淨無垢佛南無善無垢藏佛南無堅固行佛南無精進聲佛南無不離一切眾生門佛南無斷續過佛南無成就觀佛南無平等須彌面佛南無無障無礙精進堅佛南無莎羅華華王佛南無無量功德王佛南無彌留燈王佛南無藥王聲聲王佛南無梵聲王佛南無妙鼓聲王佛南無雲聲王佛南無龍自在王佛南無世間自在王佛南無陀羅尼自在王佛南無深王佛南無治諸病王佛南無藥王佛南無鷹王佛南無燈王佛南無樹提王佛南無喜王佛南無星宿王佛南無雲王佛南無雷王佛南無莎羅佛南無堅固自在王佛南無功德聚佛南無華聚佛南無寶聚佛南無寶住持庭燎佛南無住持功德佛南無住持無障力佛南無住持地力進去佛南無住持妙無垢位佛南無一切寶莊嚴色住持佛南無自在轉一切法佛南無轉法輪佛南無勝威德佛南無淨德佛南無聖威德佛南無大威德佛南無師子威德佛南無莎羅威德佛南無悲威德佛南無地威德佛南無無垢威德佛南無無垢瑠璃佛南無無垢臂佛南無無垢眼佛南無無垢面佛南無波頭摩面佛南無月面佛南無日面佛南無日威德莊嚴佛南無金色佛南無金色形佛南無可樂色佛南無瞻婆加色佛南無能與樂佛南無能與眼佛南無難勝佛南無難降伏佛南無斷諸惡佛南無難量佛南無難成佛南無俱蘇摩成佛南無甘露成佛南無寶成就佛南無功德成就佛南無日成就佛南無華成就佛南無成就樂佛南無成就功德佛南無大勝佛南無妙佛南無無垢佛南無離障佛南無婆樓那佛南無婆樓那天佛南無勇猛仙佛南無精進仙佛南無無垢仙佛南無金剛仙佛南無觀眼佛南無無障礙佛南無住虛空佛南無住清淨佛南無善住清淨功德寶佛南無善疏佛南無善思義佛南無善化佛南無善愛佛從此已上八百佛十二部經一切賢聖南無善眼佛南無善親佛南無善行佛南無善生佛南無善華佛南無善香佛南無善聲佛南無善臂佛南無善光佛南無善山佛南無功德山佛南無寶山佛南無智山佛南無勝山佛南無上山佛南無光明莊嚴佛南無大光明莊嚴佛南無清淨莊嚴佛南無波頭摩莊嚴佛南無寶中佛南無金剛合佛南無碎金剛佛南無金剛齊佛南無破金剛堅佛南無降伏魔佛南無不空見佛南無愛見佛南無現見佛南無善見佛南無大善見佛南無普見佛南無無垢見佛南無見平等不平等佛南無見一切義佛南無斷
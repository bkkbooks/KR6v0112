灌注猶如流水灌罪人口爾時南門有五千沙門口眼火出唱如是言我今云何受如是苦宛轉於地而不肯起馬頭羅剎手捉三鈷鐵叉就地而鍾其叉鈷中火焰俱出燒罪人心一日一夜萬死萬生復有鐵鈎來鈎其舌復有鐵棒來搥其頭復有飛刀來剝其肉馬頭羅剎將諸沙門來入流火河中馬頭羅剎手捉鐵箕鈔鐵火珠望口而灌鐵珠入口背上而出口眼六根烟焰俱燃鐵珠連續間無休息寶達問馬頭羅剎言此罪沙門作何等業受如是苦羅剎答曰此諸沙門不持佛戒不畏苦報貪求利養名聞稱譽不生慚愧犯四重禁而言清淨受人信施貪求飲食白衣施重甚為難消而言我消不知三寶四諦因緣亦如大海不知滿足以是因緣墮地獄苦經千萬劫出生為人瘖瘂不語寶達菩薩聞之悲泣而說是言云何解脫人今受如是苦云何已渡海還沒大海中云何大富貴還復貧窮困云何受淨戒如犯無所畏云何得正見還墮邪見中寶達說偈已遂悲泣而去錄文完方廣錩修改審定

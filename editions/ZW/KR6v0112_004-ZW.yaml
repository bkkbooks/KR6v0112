body:
  text: 南無十方光明世界勝力王如來南無如是等無量無邊如來南無常光明世界無量光明雲香彌留如來南無常莊嚴世界降伏男女如來南無沉水香世界上勝香如來南無常莊嚴世界種種華如來南無香蓋世界無邊智如來南無栴檀香世界寶上王如來南無香世界彌留如來南無普喜世界知見一切眾生信如來南無不可量世界無邊聲如來南無佛華莊嚴世界智功德勝如來南無善住世界不動步如來歸命如是等無量無邊如來南無華世界無障礙吼聲如來南無月世界普寶藏如來南無堅住世界迦葉如來南無普波頭摩世界觀一切境界鏡如來南無栴檀世界上首如來南無實世界成就義如來南無有月世界成就勝如來南無無障礙世界名稱如來南無安樂世界斷一切疑如來歸命如是等無量無邊如來南無無王王世界勝如來南無種種成就世界功德微如來南無種種華世界星宿王如來南無廣世界無量幢如來南無普畏世界月如來南無羅網世界羅網光明如來南無無驚怖世界淨聲如來南無可樂世界現寶如來南無離觀世界一切法無所發如來南無常稱世界不斷一切眾生發行如來歸命如是等無量無邊如來南無常歡喜世界無量奮迅如來南無普鏡世界建一切法如來南無普照世界普見一切法如來南無一切德成就世界成就無邊勝功德如來南無無垢世界智起光如來南無怖憂鉢羅世界波頭摩勝如來南無波頭摩怖世界十方勝如來南無華怖世界華成就如來南無天世界堅固眾生如來南無光明世界知光明如來歸命如是等無量無邊如來南無安樂調世界修智如來南無安樂世界遠離胎如來南無染世界明王如來南無雲世界斷一切煩惱如來南無普色世界無邊智稱如來南無堅固世界栴檀屋勝如來南無無比功德世界成就無比勝佛華如來南無寶世界善住力王如來南無十方上首世界起月光如來南無龍王世界上首如來歸命如是等無量無邊如來南無善住世界善高聚如來南無無怖畏世界作稱如來南無愛香世界斷諸難如來南無成就一切功德善住世界稱親如來南無成就一切勢力善住世界稱堅固如來南無憂慧世界遠離諸憂如來南無稱世界起波頭摩功德如來南無華俱蘇摩住世界善散華幢如來南無十方名稱世界放光明普至如來南無十方上首世界名稱眼如來歸命如是等無量無邊如來南無炎慧世界放炎如來南無吼世界十方稱名如來南無光明世界自在彌留如來南無寶光明世界寶光明如來南無常歡喜世界炎熾如來南無有世界三界自在奮迅如來南無無畏世界放光明輪如來南無常懸世界眾寂勝如來南無波頭摩王世界無盡勝如來南無普吼世界妙鼓聲如來歸命如是等無量無邊如來南無無畏世界普勝如來南無十方名稱世界智稱如來南無地世界山王如來南無地功德世界波頭摩輪境界勝王如來南無燃燈輪世界善住如來南無普莊嚴世界莊嚴佛境界如來南無倚世界作一切功德如來南無歡喜世界畢竟成就佛寶功德如來南無星宿行世界智上勝如來一千八百南無蓋行莊嚴世界智起光明威德王王勝如來歸命如是等無量無邊諸佛南無波頭摩世界波頭摩生王如來南無法境界自在佛南無月中光明佛南無香象佛南無阿彌陀光明佛南無波頭山佛南無波頭摩生勝佛南無栴檀勝佛南無寶積佛南無智慧佛一千七百歸命如是等無量無邊諸佛南無畏作王佛南無功德成就勝佛南無光明幢佛南無無量功德作佛南無功德成就勝佛南無一切功德成就勝佛南無波頭摩成就勝佛南無炬住持佛南無寶上勝佛南無命色華佛歸命如是等無量無邊諸佛南無上王佛南無星宿王佛南無無量彌留佛南無虛空輪清淨王佛南無無量聲佛南無寶山佛南無種種寶俱蘇摩華佛南無勝眾佛南無無塵離塵放發佛歸命如是等無量無邊諸佛南無不宿發修行佛南無金色華佛南無寶舍佛南無種種華成就佛南無放光明佛南無俱蘇摩成佛南無放蓋佛南無稱力王佛南無淨聲佛南無勝佛南無如是等無量無邊諸佛南無無量眾佛南無上首佛南無無障礙眼佛南無破散一切諸趣佛南無斷一切疑佛南無無相聲佛南無畢竟得無邊功德佛南無寶成就勝佛南無波頭摩上勝佛南無寶上佛歸命過去未來如是等無量無邊諸佛南無無障礙發修佛南無無邊佛南無寶彌留佛南無日燃燈上勝佛南無智成就勝佛南無憂鉢羅燃燈佛南無十方燃燈佛南無賢勝佛南無莎羅自在王佛南無師子佛南無寶彌留佛南無毘婆尸佛南無妙勝光明佛南無功德王光明佛南無華佛南無無量眼佛南無如是等無量無邊諸佛南無功德一昧佛南無十方燃燈佛南無賢勝佛南無娑羅自在王佛南無師子佛南無寶彌留佛南無毘婆尸佛南無明王佛南無上首佛南無上首佛南無如是等無量無邊諸佛南無大龍佛南無香上首佛南無香勝幢佛南無栴檀屋佛南無香幢佛南無無邊精進佛南無十上光明佛波頭摩上佛南無驚怖波頭摩華成就王佛南無如是等無量無邊諸佛南無寶網佛南無善住王佛南無香勝王佛南無與一切樂佛南無示一切念佛南無不定說佛南無能滅一切怖畏佛南無不住王佛南無寶光明佛南無與一切眾生安隱佛南無如是等無量無邊諸佛南無觀無量境界佛南無無虛空莊嚴勝佛南無無莊嚴佛南無修行幢佛南無成就驚怖勝華佛南無賢勝佛南無清淨眼佛南無大將佛南無上勝高佛南無不可勝幢佛南無如是等無量無邊諸佛南無可依佛南無無量無邊佛南無香彌留佛南無月輪聞王佛南無妙彌留寶成就勝佛南無聞彌留善勝佛南無淨勝佛南無無障礙眼佛南無無邊功德作佛南無威德王佛南無願善思惟成就佛南無